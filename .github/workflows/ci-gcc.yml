name: CI / GCC

on:
  push:
    branches: ["main", "dev", "release/**"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-gcc-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Quality gate — GCC
  # ---------------------------------------------------------------------------
  quality-gate-gcc:
    name: Quality Gate (GCC)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Ensure GCC is on PATH
        shell: pwsh
        run: |
          if (-not (Get-Command gcc -ErrorAction SilentlyContinue)) {
            choco install mingw --yes --no-progress
          }
          gcc --version

      - name: Build & Test
        shell: pwsh
        run: |
          Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass
          & powershell -ExecutionPolicy Bypass -File scripts\test.ps1 -Compiler gcc

      - name: Upload quality gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-gcc
          path: build/quality_gate_report.md
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Benchmark gate (gcc, host only)
  # ---------------------------------------------------------------------------
  bench:
    name: Benchmark Gate (GCC)
    runs-on: windows-latest
    needs: quality-gate-gcc

    steps:
      - uses: actions/checkout@v4

      - name: Ensure GCC is on PATH
        shell: pwsh
        run: |
          if (-not (Get-Command gcc -ErrorAction SilentlyContinue)) {
            choco install mingw --yes --no-progress
          }

      - name: Run benchmark
        shell: pwsh
        run: |
          Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass
          & powershell -ExecutionPolicy Bypass -File scripts\bench.ps1 -Compiler gcc -MemoryLimitKB 16

      - name: Upload bench reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-reports
          path: |
            build/bench/bench_report.md
            build/bench/bench_report.csv
          if-no-files-found: ignore
