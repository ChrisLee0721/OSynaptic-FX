name: build

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  native:
    name: native-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -DOSFX_ENABLE_LTO=OFF -DOSFX_ENABLE_FILE_IO=OFF -DOSFX_ENABLE_CLI=OFF
      - name: Build
        run: cmake --build build --config Release
      - name: Upload native lib
        uses: actions/upload-artifact@v4
        with:
          name: osfx-${{ matrix.os }}
          path: |
            build/lib/*.a
            build/lib/*.lib

  linux-static:
    name: linux-a
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build-linux -DOSFX_ENABLE_LTO=OFF -DOSFX_ENABLE_FILE_IO=OFF -DOSFX_ENABLE_CLI=OFF
      - name: Build
        run: cmake --build build-linux --config Release
      - name: Upload linux .a
        uses: actions/upload-artifact@v4
        with:
          name: osfx-linux-a
          path: build-linux/lib/libosfx_core.a

  avr-static:
    name: avr-a
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install AVR toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-avr binutils-avr avr-libc
      - name: Build AVR static library
        run: |
          mkdir -p build-avr/obj build-avr/lib
          for c in src/*.c; do
            avr-gcc -mmcu=atmega328p -std=c99 -Os -Iinclude -DOSFX_ENABLE_FILE_IO=0 -DOSFX_ENABLE_CLI=0 -c "$c" -o "build-avr/obj/$(basename "${c%.c}").o"
          done
          avr-ar rcs build-avr/lib/libosfx_core_avr.a build-avr/obj/*.o
      - name: Upload avr .a
        uses: actions/upload-artifact@v4
        with:
          name: osfx-avr-a
          path: build-avr/lib/libosfx_core_avr.a

  esp32-static:
    name: esp32-a
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:release-v5.2
    steps:
      - uses: actions/checkout@v4
      - name: Build ESP32 static library
        run: |
          mkdir -p build-esp32/obj build-esp32/lib
          for c in src/*.c; do
            xtensa-esp32-elf-gcc -std=c99 -Os -Iinclude -DOSFX_ENABLE_FILE_IO=0 -DOSFX_ENABLE_CLI=0 -c "$c" -o "build-esp32/obj/$(basename "${c%.c}").o"
          done
          xtensa-esp32-elf-ar rcs build-esp32/lib/libosfx_core_esp32.a build-esp32/obj/*.o
      - name: Upload esp32 .a
        uses: actions/upload-artifact@v4
        with:
          name: osfx-esp32-a
          path: build-esp32/lib/libosfx_core_esp32.a

  cortexm-static:
    name: cortexm-a
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ARM embedded toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi
      - name: Build Cortex-M static library
        run: |
          mkdir -p build-cortexm/obj build-cortexm/lib
          for c in src/*.c; do
            arm-none-eabi-gcc -mcpu=cortex-m4 -mthumb -std=c99 -Os -ffreestanding -Iinclude -DOSFX_ENABLE_FILE_IO=0 -DOSFX_ENABLE_CLI=0 -c "$c" -o "build-cortexm/obj/$(basename "${c%.c}").o"
          done
          arm-none-eabi-ar rcs build-cortexm/lib/libosfx_core_cortexm.a build-cortexm/obj/*.o
      - name: Upload cortexm .a
        uses: actions/upload-artifact@v4
        with:
          name: osfx-cortexm-a
          path: build-cortexm/lib/libosfx_core_cortexm.a

  riscv-static:
    name: riscv-a
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install RISC-V toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-riscv64-unknown-elf binutils-riscv64-unknown-elf
      - name: Build RISC-V static library
        run: |
          mkdir -p build-riscv/obj build-riscv/lib
          for c in src/*.c; do
            riscv64-unknown-elf-gcc -march=rv32imac -mabi=ilp32 -std=c99 -Os -ffreestanding -Iinclude -DOSFX_ENABLE_FILE_IO=0 -DOSFX_ENABLE_CLI=0 -c "$c" -o "build-riscv/obj/$(basename "${c%.c}").o"
          done
          riscv64-unknown-elf-ar rcs build-riscv/lib/libosfx_core_riscv32.a build-riscv/obj/*.o
      - name: Upload riscv .a
        uses: actions/upload-artifact@v4
        with:
          name: osfx-riscv-a
          path: build-riscv/lib/libosfx_core_riscv32.a

  rp2040-static:
    name: rp2040-a
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ARM embedded toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi
      - name: Build RP2040 static library
        run: |
          mkdir -p build-rp2040/obj build-rp2040/lib
          for c in src/*.c; do
            arm-none-eabi-gcc -mcpu=cortex-m0plus -mthumb -std=c99 -Os -ffreestanding -Iinclude -DOSFX_ENABLE_FILE_IO=0 -DOSFX_ENABLE_CLI=0 -c "$c" -o "build-rp2040/obj/$(basename "${c%.c}").o"
          done
          arm-none-eabi-ar rcs build-rp2040/lib/libosfx_core_rp2040.a build-rp2040/obj/*.o
      - name: Upload rp2040 .a
        uses: actions/upload-artifact@v4
        with:
          name: osfx-rp2040-a
          path: build-rp2040/lib/libosfx_core_rp2040.a

  android-static:
    name: android-aarch64-a
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
      - name: Build Android static library
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          mkdir -p build-android/obj build-android/lib
          CC="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang"
          AR="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
          for c in src/*.c; do
            "$CC" -std=c99 -Os -Iinclude -DOSFX_ENABLE_FILE_IO=0 -DOSFX_ENABLE_CLI=0 -c "$c" -o "build-android/obj/$(basename "${c%.c}").o"
          done
          "$AR" rcs build-android/lib/libosfx_core_android.a build-android/obj/*.o
      - name: Upload android .a
        uses: actions/upload-artifact@v4
        with:
          name: osfx-android-a
          path: build-android/lib/libosfx_core_android.a

  ios-static:
    name: ios-arm64-a
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build iOS static library
        run: |
          mkdir -p build-ios/obj build-ios/lib
          for c in src/*.c; do
            xcrun --sdk iphoneos clang -arch arm64 -std=c99 -Os -Iinclude -DOSFX_ENABLE_FILE_IO=0 -DOSFX_ENABLE_CLI=0 -c "$c" -o "build-ios/obj/$(basename "${c%.c}").o"
          done
          libtool -static -o build-ios/lib/libosfx_core_ios.a build-ios/obj/*.o
      - name: Upload ios .a
        uses: actions/upload-artifact@v4
        with:
          name: osfx-ios-a
          path: build-ios/lib/libosfx_core_ios.a

  wasm-static:
    name: wasm-a
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Emscripten
        run: sudo apt-get update && sudo apt-get install -y emscripten
      - name: Build WebAssembly static library
        run: |
          mkdir -p build-wasm/obj build-wasm/lib
          for c in src/*.c; do
            emcc -std=c99 -Os -Iinclude -DOSFX_ENABLE_FILE_IO=0 -DOSFX_ENABLE_CLI=0 -c "$c" -o "build-wasm/obj/$(basename "${c%.c}").o"
          done
          emar rcs build-wasm/lib/libosfx_core_wasm.a build-wasm/obj/*.o
      - name: Upload wasm .a
        uses: actions/upload-artifact@v4
        with:
          name: osfx-wasm-a
          path: build-wasm/lib/libosfx_core_wasm.a
