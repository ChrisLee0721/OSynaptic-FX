name: CI / Precompile (all targets)

# Quality gate (gcc/clang/cl) and bench are in dedicated workflow files:
#   ci-gcc.yml  — GCC quality gate + benchmark
#   ci-clang.yml — Clang quality gate
#   ci-cl.yml   — MSVC quality gate (uses ilammy/msvc-dev-cmd)

on:
  push:
    branches: ["main", "dev", "release/**"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-precompile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Precompile: build all platform .a libraries
  # Informational — does not block PR merges.
  # ---------------------------------------------------------------------------
  precompile:
    name: Precompile Libraries (all targets)
    runs-on: ubuntu-latest
    needs: quality-gate
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Install cross-toolchains (ARM / AVR / RISC-V)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc-arm-none-eabi libnewlib-arm-none-eabi \
            gcc-avr avr-libc \
            gcc-riscv64-unknown-elf \
            cmake

      - name: Install ESP32 Xtensa toolchain
        continue-on-error: true
        run: |
          TOOLCHAIN_VER="esp-12.2.0_20230208"
          curl -sL "https://github.com/espressif/crosstool-NG/releases/download/${TOOLCHAIN_VER}/xtensa-esp32-elf-12.2.0_20230208-x86_64-linux-gnu.tar.xz" \
            | sudo tar -xJ -C /opt
          echo "/opt/xtensa-esp32-elf/bin" >> $GITHUB_PATH

      - name: Build precompiled libraries (matrix)
        shell: pwsh
        run: ./scripts/build.ps1 -Matrix

      - name: Upload precompiled libraries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: precompiled-libs-ci
          path: src/**/libOSynapticFX.a
          if-no-files-found: ignore
